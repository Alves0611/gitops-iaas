apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.name }}-redis
  namespace: argocd
  labels:
    app: crossplane
    layer: infrastructure
    component: redis
    cloud: azure
spec:
  project: studying
  source:
    repoURL: https://github.com/Alves0611/gitops-crossplane.git
    targetRevision: main
    path: crossplane/azure/cache/${{ values.name }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
