
apiVersion: s3.aws.upbound.io/v1beta1
kind: BucketVersioning
metadata:
  name: test-731918213-bucket-versioning
  labels:
    environment: dev
    managed-by: crossplane
spec:
  forProvider:
    region: us-east-1
    bucketRef:
      name: test-731918213-bucket
    versioningConfiguration:
      - status: Enabled
  providerConfigRef:
    name: default
---
apiVersion: s3.aws.upbound.io/v1beta1
kind: BucketServerSideEncryptionConfiguration
metadata:
  name: test-731918213-bucket-sse
  labels:
    environment: dev
    managed-by: crossplane
spec:
  forProvider:
    region: us-east-1
    bucketRef:
      name: test-731918213-bucket
    rule:
      - applyServerSideEncryptionByDefault:
          - sseAlgorithm: AES256
  providerConfigRef:
    name: default
